name: Package

on:
    workflow_dispatch:
        inputs:
            channel:
                description: 'Release channel'
                required: true
                type: choice
                options:
                    - stable
                    - beta
                    - alpha
                default: stable
            beta_number:
                description: 'Beta suffix number (1, 2, 3...)'
                required: false
                type: string
                default: '1'
            alpha_number:
                description: 'Alpha suffix number (1, 2, 3...)'
                required: false
                type: string
                default: '1'

concurrency:
    group: ${{ github.ref }}-package
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    package:
        name: ${{ matrix.label }}
        runs-on: ${{ matrix.os }}
        defaults:
            run:
                shell: bash
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: Linux AppImage
                      os: ubuntu-24.04
                      build_command: npm run tauri:build -- --config src-tauri/tauri.linux.conf.json --bundles appimage
                      artifact_name: linux-appimage
                      artifact_path: src-tauri/target/release/bundle/appimage/*.AppImage
                    - label: macOS DMG
                      os: macos-latest
                      build_command: npm run tauri:build -- --bundles dmg
                      artifact_name: macos-dmg
                      artifact_path: src-tauri/target/release/bundle/dmg/*.dmg
        steps:
            - uses: actions/checkout@v6

            - uses: dtolnay/rust-toolchain@stable

            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: npm

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri -> target

            - name: Install Linux dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      build-essential \
                      curl \
                      file \
                      libayatana-appindicator3-dev \
                      librsvg2-dev \
                      libssl-dev \
                      libwebkit2gtk-4.1-dev \
                      libxdo-dev \
                      patchelf \
                      wget

            - run: npm ci

            - id: version
              name: Prepare release version
              run: |
                  node build-scripts/prepare-release-version.js \
                      --channel "${{ inputs.channel }}" \
                      --beta-number "${{ inputs.beta_number }}" \
                      --alpha-number "${{ inputs.alpha_number }}"

            - name: Build package
              run: ${{ matrix.build_command }}

            - uses: actions/upload-artifact@v7
              with:
                  name: VRCX-0_${{ steps.version.outputs.display_version }}_${{ matrix.artifact_name }}
                  path: ${{ matrix.artifact_path }}
                  if-no-files-found: error

name: ✨ Feature Request
description: Suggest an idea for this project
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thank you for submitting an idea.
        
        You may join our [Discord](https://discord.gg/fehKP3SVPN) server for further conversation and support.

  - type: textarea
    attributes:
      label: What would you like to see?
      description: Describe the feature.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Why would this be useful
  - type: textarea
    attributes:
      label: Explain the use case or problem it solves.
  - type: textarea
    attributes:
      label: Additional context
      description: Screenshots, examples, or anything else that helps.